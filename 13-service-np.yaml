apiVersion: v1
kind: Service 
metadata:
  name: nginx-np 
  # service labels 
  labels:
    project: roboshop 
    environment: dev 
spec:
  type: NodePort 
  # service uses the below labels to select the pods
  selector:
    project: roboshop 
    tier: frontend 
    component: frontend 
  ports: 
  - protocol: TCP
    port: 80 
    targetPort: 80 
    nodePort: 30007
