apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: nginx 
  labels:
    project: roboshop 
    tier: frontend 
    component: frontend 
    purpose: deployment 
spec:
  replicas: 3 
  selector:
    matchLabels:
      project: roboshop 
      tier: frontend 
      component: frontend 
      purpose: deployment 
  template:
    metadata:
      labels:
        project: roboshop 
        tier: frontend 
        component: frontend 
        purpose: deployment 
    spec:
      containers:
      - name: nginx 
        image: nginx
        ports: 
        - containerPort: 80 
---
apiVersion: v1 
kind: Service 
metadata:
  name: nginx 
  labels:
    project: roboshop 
    tier: frontend 
    component: frontend 
    purpose: deployment 
spec:
  selector: 
    project: robsohop 
    tier: frontend 
    component: frontend 
    purpose: deployment 
  ports:
  - protocol: TCP 
    port: 80 
    targetPort: 80 
