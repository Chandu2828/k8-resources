apiVersion: v1 
kind: ReplicaSet
metadata:
  name: frontend 
  labels:
    project: roboshop 
    tier: frontend 
    component: frontend 
spec:
  replicas: 3 
  # replicaset uses these labels to match pods 
  selector:
    matchLabels:
      project: roboshop 
      tier: frontend 
      component: frontend 
  # pod definition   
  template:
    metadata:
      labels:
        project: roboshop 
        tier: frontend 
        component: frontend 
    spec:
      containers: 
      - name: nginx 
        image: nginx
          