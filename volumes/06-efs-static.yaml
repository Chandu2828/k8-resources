apiVerison: v1 
kind: PeristentVolume 
metadata:
  name: efs-static
spec:
  # here capacity and storage is dummy in EFS, just for api definition
  accessModes:
  - ReadWriteMany 
  capacity:
    storage: 5Gi 
  volumeMode: Filesystem 
  storageClassName: "" # for static provisioning sc should be empty 
  persistentVolumeReclaimPolicy: Retain 
  csi: 
    driver: efs.csi.aws.com 
    volumeHandle: efs:fs-041afbaee65e39326
---
apiVersion: v1 
kind: PersistentVolumeClaim 
metadata:
  name: efs-static 
spec:
  accessModes:
  - ReadWriteMany 
  storageClassName: "" 
  resources:
    requests:
      storage: 5Gi 
---
apiVersion: v1 
kind: Pod 
metadata:
  name: efs-static 
spec:
  containers:
  - name: nginx 
    image: nginx 
    volumeMounts:
    - name: peristent-storage 
      mountPath: /usr/share/nginx/html 
  volumes:
  - name: persistent-storage 
    persistentVolumeClaim:
      claimName: efs-static 